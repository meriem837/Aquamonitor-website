<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌱 aquasmart</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="image-container">
      <img
        src="aquasmart pic.jpg"
        class="agriculture-pic"
        alt="Irrigation Image"
      />
      <h1>مرحباً بك</h1>
    </div>
    <div class="divider">
      <span class="divider-text">بيانات المستشعرات</span>
    </div>
    <div class="sensors">
      <div class="sensor-data">
        <div class="fake-data"><span id="soilHumidity">40</span>%</div>
        مستشعر رطوبة التربة
      </div>
      <div class="sensor-data">
        <div class="fake-data"><span id="airTemperature">25</span>°C</div>
        مستشعر درجة الحرارة
      </div>
      <div class="sensor-data">
        <div class="fake-data"><span id="airHumidity">60</span>%</div>
        مستشعر رطوبة الهواء
      </div>
    </div>
    <div class="logo-container">
      <img class="logo" src="logo aquasmart.jpeg" />
      <span class="logo-text">aquasmart</span>
    </div>
    <div class="plant-type">
      ما هو نوع النبتة الذي تزرعها؟
      <div class="buttons">
        <button class="plant-button" id="القمح">🌾 القمح</button>
        <button class="plant-button" id="الشعير">🌿 الشعير</button>
        <button class="plant-button" id="الزيتون">🫒 الزيتون</button>
        <button class="plant-button" id="الطماطم">🍅 الطماطم</button>
        <button class="plant-button" id="الحمضيات">🍊 الحمضيات</button>
        <button class="plant-button" id="البطاطس">🥔 البطاطس</button>
        <button class="plant-button" id="البصل">🧅البصل</button>
        <button class="plant-button" id="الشمندر السكري">
          🍬 الشمندر السكري
        </button>
        <button class="plant-button" id="الذرة">🌽 الذرة</button>
        <button class="plant-button" id="البطيخ">🍉 البطيخ</button>
      </div>
    </div>
    <div class="irrigation-operation">
      <div class="right-side-irrigation">
        <div class="irrigation-title">عملية الري</div>
        <div class="progress">
          <div class="outer">
            <div class="inner">
              <div id="number">0%</div>
            </div>
          </div>
          <svg
            xmlns="https://www.w3.org/2000/svg"
            version="1.1"
            width="160px"
            height="160px"
          >
            <defs>
              <lineargradient id="gradientColor">
                <stop offset="0%" stop-color="#DA22FF" />
                <stop offset="100%" stop-color="#9733EE" />
              </lineargradient>
            </defs>
            <circle cx="80" cy="80" r="70" stroke-linecap="round" />
          </svg>
        </div>
        <button id="irrigation-button">ابدأ الري</button>
      </div>
      <img src="plant illustration.png" class="pic-of-a-pant" />
    </div>
    <footer>
      <h2>📱 تابعونا على إنستغرام!</h2>
      <a
        href="https://www.instagram.com/aquasmart._?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
        target="_blank"
      >
        اضغط هنا لمتابعتنا</a
      >
      <div class="coder">
        This website was coded with ❤️ by Meriem Elazzaoui
      </div>
    </footer>
  </body>
  <script src="script.js"></script>
</html>
